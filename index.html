<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чтение текста</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        textarea {
            width: 100%;
            height: 250px;
            font-size: 18px;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            margin-top: 10px;
            padding: 12px 20px;
            font-size: 18px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <h2>Чтение текста вслух</h2>

    <textarea id="text">
Введите текст здесь...
    </textarea>

    <br>

    <button onclick="speak()">▶ Читать</button>
    <button onclick="stopSpeech()">■ Стоп</button>

    <script>
        let utterance;

        function speak() {
            speechSynthesis.cancel();

            const text = document.getElementById("text").value;

            utterance = new SpeechSynthesisUtterance(text);

            // Русский язык
            utterance.lang = "ru-RU";

            // Скорость (0.1 - 10)
            utterance.rate = 1.0;

            speechSynthesis.speak(utterance);
        }

        function stopSpeech() {
            speechSynthesis.cancel();
        }
    </script>

</body>
</html>
